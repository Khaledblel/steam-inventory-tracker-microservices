syntax = "proto3";

package pricing;

service PricingService {
  // Fetch the latest price of an item
  rpc GetItemPrice (GetItemPriceRequest) returns (GetItemPriceResponse);
}

message GetItemPriceRequest {
  string market_hash_name = 1;
}

message GetItemPriceResponse {
  string market_hash_name = 1;
  double current_price = 2;
  string currency = 3;
  string last_updated = 4;
}